<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Web栞</title>
  <style>
    body{font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin:0; width:360px; color:#222; background:#f8fafc;}
    .popup-shell{padding:14px;}
    .header{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:12px;}
    h3{margin:0; font-size:17px; line-height:1.2;}
    #version{color:#7a7f87; font-size:11px; white-space:nowrap;}
    label{display:grid; gap:6px; color:#424851; font-size:12px; font-weight:600;}
    textarea{box-sizing:border-box; width:100%; min-height:68px; resize:vertical; border:1px solid #cfd7e3; border-radius:10px; padding:10px; font:13px/1.45 system-ui, sans-serif; background:#fff;}
    button{font:inherit;}
    #save{margin-top:10px; width:100%; border:0; border-radius:10px; padding:10px 12px; background:#2563eb; color:#fff; font-weight:700; cursor:pointer;}
    #save:hover{background:#1d4ed8;}
    h4{margin:18px 0 9px 0; font-size:13px; color:#424851;}
    #status{margin-top:10px; font-size:12px; color:#667085;}
    #notes{list-style:none; padding:0; margin:0; display:grid; gap:10px; max-height:360px; overflow:auto;}
    .note-item{display:grid; gap:10px; border:1px solid #e2e8f0; border-radius:14px; padding:11px; background:#fffdf0; box-shadow:0 1px 2px rgba(15,23,42,.06);}
    .note-item--completed{background:#f8fafc; border-style:dashed;}
    .note-open-button{display:block; width:100%; margin:0; padding:0; border:0; background:transparent; color:inherit; text-align:left; cursor:pointer;}
    .note-open-button:hover .note-text{text-decoration:underline;}
    .note-text{margin:0 0 7px 0; white-space:pre-wrap; overflow-wrap:anywhere; font-size:14px; line-height:1.45; font-weight:700; color:#1f2937;}
    .note-context{margin:0; color:#667085; font-size:11px; line-height:1.35; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow-wrap:anywhere;}
    .complete-button{justify-self:end; margin:0; border:1px solid #cbd5e1; border-radius:999px; background:#fff; color:#334155; font-size:12px; padding:6px 10px; cursor:pointer;}
    .complete-button:hover{background:#f1f5f9;}
    .note-completed-label{justify-self:start; margin:0; border-radius:999px; background:#e2e8f0; color:#475569; font-size:11px; font-weight:700; padding:4px 8px;}
    .empty-notes{margin:0; border:1px dashed #cbd5e1; border-radius:12px; padding:16px; background:#fff; color:#667085; font-size:12px; text-align:center;}
  </style>
</head>
<body>
  <main class="popup-shell">
    <div class="header">
      <h3>Web栞</h3>
      <span id="version" aria-label="version"></span>
    </div>
    <label>
      栞（次のアクション）
      <textarea id="note" rows="2" placeholder="NPS返信"></textarea>
    </label>
    <button id="save">保存</button>
    <h4>すべての付箋</h4>
    <ul id="notes" aria-live="polite"></ul>
    <div id="status"></div>
  </main>
  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
