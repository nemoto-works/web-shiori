<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Web栞</title>
  <style>
    body{font-family: system-ui, sans-serif; margin:8px; width: 280px;}
    textarea{box-sizing:border-box; width:100%;}
    button{margin-top:8px; width:100%;}
    h3{margin:0 0 6px 0; font-size: 16px;}
    h4{margin:14px 0 6px 0; font-size: 14px;}
    #status{margin-top:8px; font-size: 12px; color:#555;}
    #notes{list-style:none; padding:0; margin:0; display:grid; gap:8px;}
    .note-item{border:1px solid #ddd; border-radius:8px; padding:8px; background:#fffdf0;}
    .note-item--completed{background:#f6f6f6; color:#666;}
    .note-text{margin:0 0 6px 0; white-space:pre-wrap; font-size:13px;}
    .note-context{margin:0; color:#555; font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
    .complete-button{font-size:12px; padding:6px;}
    .note-completed-label,.empty-notes{margin:8px 0 0 0; color:#777; font-size:12px;}
    .popup-footer{margin-top:10px; text-align:right; color:#888; font-size:11px;}
  </style>
</head>
<body>
  <h3>Web栞</h3>
  <label>
    栞（次のアクション）
    <textarea id="note" rows="2" placeholder="NPS返信"></textarea>
  </label>
  <button id="save">保存</button>
  <h4>すべての付箋</h4>
  <ul id="notes" aria-live="polite"></ul>
  <div id="status"></div>
  <footer class="popup-footer" aria-label="build version">
    <span id="version"></span>
  </footer>
  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
