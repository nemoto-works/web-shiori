<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Web栞</title>
  <style>
    :root{color-scheme:light;}
    *{box-sizing:border-box;}
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;width:380px;background:#f7f7fb;color:#1f2937;}
    .popup-shell{padding:16px;}
    .popup-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;}
    h3{margin:0;font-size:18px;line-height:1.2;}
    .version{flex:0 0 auto;color:#8a92a3;font-size:11px;line-height:1.4;padding-top:3px;}
    label{display:grid;gap:6px;color:#4b5563;font-size:12px;font-weight:600;}
    textarea{width:100%;min-height:68px;padding:10px 12px;border:1px solid #d5d8e2;border-radius:10px;background:#fff;box-shadow:inset 0 1px 2px rgba(15,23,42,.04);font:13px/1.45 inherit;resize:vertical;}
    button{font:inherit;}
    #save{width:100%;margin-top:10px;padding:10px 12px;border:0;border-radius:10px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer;}
    #save:hover{background:#1d4ed8;}
    .section-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:18px 0 10px;}
    h4{margin:0;font-size:14px;line-height:1.3;}
    #status{color:#6b7280;font-size:12px;white-space:nowrap;}
    #notes{list-style:none;padding:0;margin:0;display:grid;gap:12px;max-height:430px;overflow:auto;}
    .note-item{display:grid;gap:10px;border:1px solid #e3e6ef;border-radius:14px;padding:12px;background:#fffdf4;box-shadow:0 1px 2px rgba(15,23,42,.06);}
    .note-item--completed{background:#f3f4f6;border-color:#d9dde7;}
    .note-card-button{display:grid;gap:8px;width:100%;padding:0;border:0;background:transparent;color:inherit;text-align:left;cursor:pointer;}
    .note-card-button:hover .note-text{text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:3px;}
    .note-text{margin:0;color:#111827;font-size:14px;font-weight:700;line-height:1.45;white-space:pre-wrap;overflow-wrap:anywhere;}
    .note-item--completed .note-text{color:#4b5563;text-decoration:line-through;text-decoration-color:#9ca3af;}
    .note-meta{display:grid;gap:3px;min-width:0;}
    .note-title,.note-url{margin:0;color:#6b7280;font-size:11px;line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .note-url{color:#8a92a3;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
    .note-actions{display:flex;align-items:center;justify-content:space-between;gap:10px;border-top:1px solid rgba(148,163,184,.28);padding-top:10px;}
    .complete-button{margin-left:auto;padding:6px 10px;border:1px solid #bfdbfe;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:700;cursor:pointer;}
    .complete-button:hover{background:#dbeafe;}
    .note-completed-label{display:inline-flex;align-items:center;gap:4px;margin:0;padding:4px 9px;border-radius:999px;background:#e5e7eb;color:#4b5563;font-size:12px;font-weight:700;}
    .empty-notes{margin:0;padding:16px;border:1px dashed #d1d5db;border-radius:12px;background:#fff;color:#6b7280;font-size:13px;text-align:center;}
  </style>
</head>
<body>
  <main class="popup-shell">
    <header class="popup-header">
      <h3>Web栞</h3>
      <span id="version" class="version" aria-label="build version"></span>
    </header>
    <label>
      栞（次のアクション）
      <textarea id="note" rows="3" placeholder="NPS返信"></textarea>
    </label>
    <button id="save" type="button">保存</button>
    <div class="section-header">
      <h4>すべての付箋</h4>
      <div id="status"></div>
    </div>
    <ul id="notes" aria-live="polite"></ul>
  </main>
  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
