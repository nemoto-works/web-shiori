name: Build extension artifact

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run extension smoke test
        run: node extension/smoke-test.mjs

      - name: Zip extension
        run: |
          cd extension
          zip -r ../web-shiori.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-shiori
          path: web-shiori.zip
          retention-days: 7
